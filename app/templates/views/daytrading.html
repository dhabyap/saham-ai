<template v-else-if="currentView === 'daytrading'">
<div class="tabs">
<button class="tab-btn" :class="{ active: currentTab === 'signals' }" @click="currentTab = 'signals'">Signals</button>
<button class="tab-btn" :class="{ active: currentTab === 'candidates' }" @click="currentTab = 'candidates'">Candidates</button>
<button class="tab-btn" :class="{ active: currentTab === 'history' }" @click="currentTab = 'history'">History</button>
</div>
<div>
          <div class="tab-pane" :class="{ active: currentTab === 'signals' }">
            <!-- SKELETON loading -->
            <template v-if="daytradingLoading">
              <div class="section">
                <div class="section-head">
                  <div class="section-title"><div class="skeleton-text" style="width:220px;height:18px"></div></div>
                  <div class="skeleton-badge" style="width:80px;height:28px;border-radius:6px"></div>
                </div>
                <div class="candidate-row">
                  <div v-for="n in 4" :key="n" class="candidate-card skeleton-card" style="padding:16px">
                    <div class="flex justify-between mb-2"><div class="skeleton-text" style="width:50px"></div><div class="skeleton-badge" style="width:60px;height:18px"></div></div>
                    <div class="skeleton-text" style="width:100px;height:12px;margin-bottom:4px"></div>
                    <div class="skeleton-value" style="height:22px;width:50px"></div>
                    <div class="skeleton-text" style="width:80px;height:12px;margin:6px 0 4px"></div>
                    <div class="skeleton-value" style="height:18px;width:70px"></div>
                  </div>
                </div>
              </div>
            </template>
            <template v-else>
            <div class="section">
              <div class="section-head">
                <div class="section-title">🎯 BPJS Day Trading — Active Signals</div>
                <button class="view-all" @click="mockScan">Scan Now →</button>
              </div>
              <div class="candidate-row">
                <div v-for="item in dayTradingSignals" :key="item.code" class="candidate-card">
                  <div class="cc-head">
                    <span class="cc-code">{{ item.code }}</span>
                    <span class="badge" :class="'badge-' + item.signalClass">{{ item.signal }}</span>
                  </div>
                  <div class="cc-detail">Confidence</div>
                  <div class="cc-val" style="color:var(--accent)">{{ item.confidence }}%</div>
                  <div class="cc-detail" style="margin-top:4px">Price</div>
                  <div class="cc-val">{{ item.price }}</div>
                  <div class="cc-detail" style="margin-top:4px">Entry / Exit</div>
                  <div class="cc-val" style="font-size:13px">{{ item.entry }} / {{ item.exit }}</div>
                </div>
                <div v-if="dayTradingSignals.length === 0" class="card" style="text-align:center;padding:40px;color:var(--muted);width:100%">
                  ⏳ Memuat data sinyal... Scan butuh waktu beberapa detik. Tekan "Scan Now" untuk refresh.
                </div>
              </div>
            </div>
            </template>
          </div>
          <div class="tab-pane" :class="{ active: currentTab === 'candidates' }">
            <!-- SKELETON loading -->
            <template v-if="daytradingLoading">
              <div class="section">
                <div class="section-title"><div class="skeleton-text" style="width:200px;height:18px"></div></div>
                <div class="card p-4" style="padding:0;overflow:hidden">
                  <div v-for="n in 6" :key="n" class="skeleton-table-row" style="grid-template-columns:80px 1fr 60px 80px 60px 60px 80px 80px 60px;margin-bottom:4px;padding:8px 12px"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
                </div>
              </div>
            </template>
            <template v-else>
            <div class="section">
              <div class="section-title">📋 BPJS Candidates — Sorted by Confidence</div>
              <div class="card" style="padding:0;overflow:hidden">
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr><th>Stock</th><th>Signal</th><th>Conf</th><th>Entry Price</th><th>TP</th><th>CL</th><th>Volume Ratio</th><th>Foreign Flow</th><th>Action</th></tr>
                    </thead>
                    <tbody>
                      <tr v-for="row in dayTradingCandidates" :key="row.stock">
                        <td style="font-weight:600">{{ row.stock }}</td>
                        <td><span class="badge" :class="'badge-' + row.signalClass">{{ row.signal }}</span></td>
                        <td>{{ row.conf }}%</td>
                        <td>{{ row.entry }}</td>
                        <td>{{ row.tp }}</td>
                        <td>{{ row.cl }}</td>
                        <td>{{ row.volRatio }}</td>
                        <td>{{ row.foreignFlow }}</td>
                        <td><span class="badge" :class="row.action === 'Buy' ? 'badge-success' : 'badge-warning'">{{ row.action }}</span></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
            </template>
          </div>
          <div class="tab-pane" :class="{ active: currentTab === 'history' }">
            <!-- SKELETON loading -->
            <template v-if="daytradingLoading">
              <div class="section">
                <div class="section-title"><div class="skeleton-text" style="width:200px;height:18px"></div></div>
                <div class="card p-4" style="padding:0;overflow:hidden">
                  <div v-for="n in 5" :key="n" class="skeleton-table-row" style="grid-template-columns:120px 80px 80px 80px 80px 80px;margin-bottom:4px;padding:8px 12px"><div></div><div></div><div></div><div></div><div></div><div></div></div>
                </div>
              </div>
            </template>
            <template v-else>
            <div class="section">
              <div class="section-title">📖 Day Trading History</div>
              <div class="card" style="padding:0;overflow:hidden">
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr><th>Date</th><th>Stock</th><th>Entry</th><th>Exit</th><th>Profit %</th><th>Result</th></tr>
                    </thead>
                    <tbody>
                      <tr v-for="row in dayTradingHistory" :key="row.stock + row.date">
                        <td style="color:var(--muted)">{{ row.date }}</td>
                        <td style="font-weight:600">{{ row.stock }}</td>
                        <td>{{ row.entry }}</td>
                        <td>{{ row.exit }}</td>
                        <td :class="row.profitClass">{{ row.profit }}</td>
                        <td><span class="badge" :class="'badge-' + row.resultClass">{{ row.result }}</span></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
            </template>
          </div>
        </div>
</template>
