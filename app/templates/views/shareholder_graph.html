{% extends "layout.html" %}

{% block title %}Shareholder Graph{% endblock %}

{% block head %}
    {{ super() }}
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style type="text/css">
        #network {
            width: 100%;
            height: 700px;
            border: 1px solid lightgray;
            background-color: #222; /* Dark background */
        }
        .network-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .network-controls label {
            color: #ccc;
        }
    </style>
{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-100 mb-6">Shareholder Network Graph</h1>

    <div class="network-controls">
        <label for="period-select" class="text-gray-300">Select Period:</label>
        <select id="period-select" class="bg-gray-700 text-gray-100 border border-gray-600 rounded-md p-2">
            <option value="">Latest Period</option>
        </select>
        <button id="refresh-graph" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md">Refresh Graph</button>
    </div>

    <div id="network"></div>
</div>

<script type="text/javascript">
    let network;
    let data; // Stores network data (nodes and edges)

    // Fetch available periods
    async function fetchPeriods() {
        try {
            const response = await fetch('/api/shareholders/periods');
            const result = await response.json();
            if (result.status === 'ok') {
                const select = document.getElementById('period-select');
                select.innerHTML = '<option value="">Latest Period</option>'; // Reset
                result.periods.forEach(period => {
                    const option = document.createElement('option');
                    option.value = period;
                    option.textContent = period;
                    select.appendChild(option);
                });
                if (result.latest) {
                    select.value = result.latest;
                }
            }
        } catch (error) {
            console.error('Error fetching periods:', error);
        }
    }

    // Fetch graph data
    async function fetchGraphData(period = '') {
        try {
            const url = period ? `/api/shareholders/network-data?period=${period}` : '/api/shareholders/network-data';
            const response = await fetch(url);
            const result = await response.json();
            if (result.status === 'ok') {
                return result;
            } else {
                console.error('Error fetching graph data:', result.error);
                return { nodes: [], edges: [] };
            }
        } catch (error) {
            console.error('Network error fetching graph data:', error);
            return { nodes: [], edges: [] };
        }
    }

    // Initialize and draw the network
    async function drawNetwork() {
        const period = document.getElementById('period-select').value;
        const graphData = await fetchGraphData(period);

        const nodes = new vis.DataSet(graphData.nodes);
        const edges = new vis.DataSet(graphData.edges);

        const container = document.getElementById('network');
        data = { nodes: nodes, edges: edges };
        const options = {
            nodes: {
                shape: 'dot',
                size: 16,
                font: {
                    size: 12,
                    color: '#ddd'
                },
                borderWidth: 2
            },
            edges: {
                width: 1,
                arrows: 'to',
                font: {
                    size: 10,
                    color: '#bbb',
                    align: 'middle'
                },
                color: {
                    color: '#888',
                    highlight: '#fff',
                    hover: '#fff',
                    inherit: 'from',
                    opacity: 0.8
                }
            },
            groups: {
                stock: {
                    color: { background: '#3B82F6', border: '#1D4ED8' },
                    shape: 'square',
                    size: 20,
                    font: { color: '#fff' }
                },
                shareholder: {
                    color: { background: '#EF4444', border: '#B91C1C' },
                    shape: 'dot',
                    size: 25,
                    font: { color: '#fff' }
                }
            },
            physics: {
                forceAtlas2Based: {
                    gravitationalConstant: -100,
                    centralGravity: 0.005,
                    springLength: 200,
                    springConstant: 0.08,
                    damping: 0.4
                },
                maxVelocity: 50,
                minVelocity: 0.75,
                solver: 'forceAtlas2Based',
                stabilization: { iterations: 2000 }
            }
        };

        if (network) {
            network.destroy(); // Destroy existing network instance
        }
        network = new vis.Network(container, data, options);

        network.on("click", function (params) {
            if (params.nodes.length > 0) {
                const nodeId = params.nodes[0];
                const clickedNode = nodes.get(nodeId);
                console.log("Clicked node:", clickedNode);
                // Future: show detailed info in a sidebar or modal
            }
        });
    }

    // Event listeners
    document.addEventListener('DOMContentLoaded', async () => {
        await fetchPeriods();
        drawNetwork();
    });

    document.getElementById('refresh-graph').addEventListener('click', drawNetwork);
</script>
{% endblock %}
